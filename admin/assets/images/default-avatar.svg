<?xml version="1.0" encoding="UTF-8"?>
<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Circle with Professional Gradient -->
  <circle cx="100" cy="100" r="100" fill="url(#professionalGradient)"/>
  
  <!-- Subtle Pattern Overlay -->
  <circle cx="100" cy="100" r="100" fill="url(#pattern)" opacity="0.1"/>
  
  <!-- Professional Admin Figure -->
  <g transform="translate(100, 100)">
    <!-- Head -->
    <circle cx="0" cy="-25" r="28" fill="white" opacity="0.95"/>
    
    <!-- Professional Suit Body -->
    <path d="M-40 10 Q-40 0 -30 0 L30 0 Q40 0 40 10 L40 50 Q40 60 30 60 L-30 60 Q-40 60 -40 50 Z" fill="white" opacity="0.95"/>
    
    <!-- Suit Lapels -->
    <path d="M-25 0 L-15 15 L-25 25 Z" fill="white" opacity="0.8"/>
    <path d="M25 0 L15 15 L25 25 Z" fill="white" opacity="0.8"/>
    
    <!-- Professional Tie -->
    <path d="M0 0 L-6 18 L0 50 L6 18 Z" fill="#1E40AF" opacity="0.9"/>
    <ellipse cx="0" cy="2" rx="4" ry="3" fill="#1E40AF"/>
    
    <!-- Admin Crown/Badge -->
    <g transform="translate(0, -45)">
      <circle cx="0" cy="0" r="15" fill="#FFD700" opacity="0.9"/>
      <path d="M-8 -5 L0 -12 L8 -5 L6 0 L10 3 L0 2 L-10 3 L-6 0 Z" fill="#FF6B35"/>
      <circle cx="0" cy="0" r="3" fill="#FF6B35"/>
    </g>
    
    <!-- Subtle Highlights -->
    <ellipse cx="-8" cy="-30" rx="3" ry="4" fill="white" opacity="0.3"/>
    <ellipse cx="8" cy="-30" rx="3" ry="4" fill="white" opacity="0.3"/>
  </g>
  
  <!-- Medical Cross (Pharmacy Symbol) -->
  <g transform="translate(160, 40)" opacity="0.6">
    <circle cx="0" cy="0" r="18" fill="white" opacity="0.9"/>
    <rect x="-2" y="-12" width="4" height="24" fill="#10B981"/>
    <rect x="-12" y="-2" width="24" height="4" fill="#10B981"/>
  </g>
  
  <!-- Gradient Definitions -->
  <defs>
    <linearGradient id="professionalGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0EA5E9;stop-opacity:1" />
      <stop offset="30%" style="stop-color:#10B981;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EC4899;stop-opacity:1" />
    </linearGradient>
    
    <pattern id="pattern" patternUnits="userSpaceOnUse" width="20" height="20">
      <rect width="20" height="20" fill="none"/>
      <circle cx="10" cy="10" r="1" fill="white" opacity="0.3"/>
    </pattern>
  </defs>
</svg>